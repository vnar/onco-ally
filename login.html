<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Onco-Ally</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0f1e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5em;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0,188,212,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(13,71,161,0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(255,179,0,0.05) 0%, transparent 40%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1) both;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

    .login-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 2.5em 2.25em;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }

    .login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6em;
      margin-bottom: 2em;
    }
    .login-brand img { width: 38px; height: 38px; border-radius: 10px; box-shadow: 0 0 16px rgba(0,188,212,0.4); }
    .login-brand span { font-size: 1.3em; font-weight: 700; background: linear-gradient(90deg, #fff, #00BCD4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    h1 { font-size: 1.6em; font-weight: 800; color: #fff; letter-spacing: -0.02em; margin-bottom: 0.3em; text-align: center; }
    .subtitle { font-size: 0.85em; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 2em; }

    .input-group {
      position: relative;
      margin-bottom: 1em;
    }
    .input-group ion-icon {
      position: absolute;
      left: 1em;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 1.1em;
      pointer-events: none;
    }
    .input-group input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.85em 1em 0.85em 2.8em;
      font-family: inherit;
      font-size: 0.92em;
      color: #fff;
      outline: none;
      transition: all 0.2s;
    }
    .input-group input::placeholder { color: rgba(255,255,255,0.3); }
    .input-group input:focus { border-color: rgba(0,188,212,0.5); background: rgba(0,188,212,0.05); box-shadow: 0 0 0 3px rgba(0,188,212,0.1); }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #FFB300 0%, #FF8F00 100%);
      color: #1a1a1a;
      border: none;
      border-radius: 12px;
      padding: 0.9em;
      font-family: inherit;
      font-size: 0.95em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(255,179,0,0.35);
      margin-top: 0.5em;
      letter-spacing: 0.01em;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,179,0,0.5); }
    .login-btn:active { transform: translateY(0); }

    .error-msg { color: #F87171; font-size: 0.82em; text-align: center; margin-top: 0.75em; min-height: 1.2em; }

    .demo-creds {
      margin-top: 1.5em;
      background: rgba(0,188,212,0.06);
      border: 1px solid rgba(0,188,212,0.15);
      border-radius: 12px;
      padding: 1em 1.25em;
    }
    .demo-creds p { font-size: 0.78em; color: rgba(255,255,255,0.4); line-height: 1.7; text-align: center; }
    .demo-creds strong { color: rgba(255,255,255,0.6); }

    .back-link { display: block; text-align: center; margin-top: 1.5em; font-size: 0.82em; color: rgba(255,255,255,0.35); }
    .back-link a { color: #00BCD4; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <img src="images/onco-ally-logo.png" alt="Onco-Ally">
        <span>Onco-Ally</span>
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account to continue</p>

      <form onsubmit="return handleLogin(event)">
        <div class="input-group">
          <ion-icon name="person-outline"></ion-icon>
          <input type="text" id="username" placeholder="Username" required autocomplete="username">
        </div>
        <div class="input-group">
          <ion-icon name="lock-closed-outline"></ion-icon>
          <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn">Sign In</button>
        <p class="error-msg" id="errorMsg"></p>
      </form>

      <div class="demo-creds">
        <p>Demo credentials: <strong>patient / provider / partner</strong> — password: <strong>onco2025</strong></p>
      </div>
    </div>
    <p class="back-link"><a href="index.html">← Back to Onco-Ally</a></p>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");
      const validPassword = "onco2025";
      if ((username === "patient" || username === "provider" || username === "partner") && password === validPassword) {
        window.location.href = username === "patient" ? "patients.html" : username === "provider" ? "providers.html" : "partners.html";
      } else {
        errorMsg.textContent = "Invalid credentials. Please try again.";
      }
      return false;
    }
  </script>
</body>
</html>
