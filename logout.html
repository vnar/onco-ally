<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logging out | Onco-Ally</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',sans-serif; background:#0a0f1e; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh; text-align:center; flex-direction:column; gap:1em; }
    .spinner { width:40px; height:40px; border:3px solid rgba(0,188,212,0.2); border-top-color:#00BCD4; border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:0.5em; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:rgba(255,255,255,0.5); font-size:0.9em; }
  </style>
  <script>
    window.onload = function() { window.location.href = "index.html"; };
  </script>
</head>
<body>
  <div class="spinner"></div>
  <p>Signing you out…</p>
</body>
</html>
